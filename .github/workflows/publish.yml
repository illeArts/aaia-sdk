name: Publish to NuGet

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Required for NuGet Trusted Publishing (OIDC)

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore src/AAIA.Shared.Contracts/AAIA.Shared.Contracts.csproj

      - name: Build
        run: dotnet build src/AAIA.Shared.Contracts/AAIA.Shared.Contracts.csproj -c Release --no-restore

      - name: Pack
        run: >
          dotnet pack src/AAIA.Shared.Contracts/AAIA.Shared.Contracts.csproj
          -c Release --no-build
          /p:Version=${{ steps.version.outputs.VERSION }}
          -o ./artifacts

      - name: Push to NuGet.org (Trusted Publishing)
        run: |
          NUGET_TOKEN=$(curl -sS "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=nuget.org" \
            -H "Authorization: Bearer ${ACTIONS_RUNTIME_TOKEN}" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['value'])")
          dotnet nuget push ./artifacts/*.nupkg \
            --api-key "$NUGET_TOKEN" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      - name: Push symbols
        run: |
          NUGET_TOKEN=$(curl -sS "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=nuget.org" \
            -H "Authorization: Bearer ${ACTIONS_RUNTIME_TOKEN}" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['value'])")
          dotnet nuget push ./artifacts/*.snupkg \
            --api-key "$NUGET_TOKEN" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
        continue-on-error: true
