name: Build & Pack

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore src/AAIA.Shared.Contracts/AAIA.Shared.Contracts.csproj

      - name: Build
        run: dotnet build src/AAIA.Shared.Contracts/AAIA.Shared.Contracts.csproj -c Release --no-restore

      - name: Test
        run: dotnet test tests/AAIA.Shared.Contracts.Tests/AAIA.Shared.Contracts.Tests.csproj -c Release

      - name: Pack
        run: dotnet pack src/AAIA.Shared.Contracts/AAIA.Shared.Contracts.csproj -c Release --no-build -o ./artifacts

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuget-package
          path: ./artifacts/*.nupkg
